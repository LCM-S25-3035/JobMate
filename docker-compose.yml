services:
  # Flask Application
  web:
    build: .
    container_name: jobmate_web
    ports:
      - "5002:5002"
    environment:
      - FLASK_ENV=docker
      - DATABASE_URL=postgresql+psycopg://jobmate_user:jobmate_password@postgres:5432/jobmate_db
      - MONGODB_URI=mongodb://mongodb:27017/
      - MONGODB_DB=jobmate_mongo
      - REDIS_URL=redis://redis:6379/0
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ELASTICSEARCH_INDEX_PREFIX=jobmate
      - SECRET_KEY=your-super-secret-key-change-in-production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_started
      redis:
        condition: service_started
      elasticsearch:
        condition: service_healthy
    networks:
      - jobmate_network
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: jobmate_postgres
    environment:
      - POSTGRES_DB=jobmate_db
      - POSTGRES_USER=jobmate_user
      - POSTGRES_PASSWORD=jobmate_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobmate_user -d jobmate_db"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - jobmate_network
    restart: unless-stopped

  # MongoDB Database
  mongodb:
    image: mongo:7-jammy
    container_name: jobmate_mongodb
    environment:
      - MONGO_INITDB_DATABASE=jobmate_mongo
    volumes:
      - mongodb_data:/data/db
      - ./database/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    ports:
      - "27017:27017"
    networks:
      - jobmate_network
    restart: unless-stopped

  # Redis Cache & Message Broker
  redis:
    image: redis:7-alpine
    container_name: jobmate_redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    networks:
      - jobmate_network
    restart: unless-stopped

  # Elasticsearch for Search and Analytics
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: jobmate_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - cluster.name=jobmate-cluster
      - node.name=jobmate-node
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
      - "9300:9300"
    networks:
      - jobmate_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Kibana for Elasticsearch UI
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: jobmate_kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
      - xpack.encryptedSavedObjects.encryptionKey=fhjskloppd678ehkdfdlliverpoolfcr
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - jobmate_network
    restart: unless-stopped

  # Celery Worker for Background Tasks
  celery_worker:
    build: .
    container_name: jobmate_celery_worker
    command: celery -A app.tasks worker --loglevel=info
    environment:
      - FLASK_ENV=docker
      - DATABASE_URL=postgresql+psycopg://jobmate_user:jobmate_password@postgres:5432/jobmate_db
      - MONGODB_URI=mongodb://mongodb:27017/
      - MONGODB_DB=jobmate_mongo
      - REDIS_URL=redis://redis:6379/0
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ELASTICSEARCH_INDEX_PREFIX=jobmate
      - SECRET_KEY=your-super-secret-key-change-in-production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      - postgres
      - mongodb
      - redis
      - elasticsearch
    networks:
      - jobmate_network
    restart: unless-stopped

  # Celery Beat for Scheduled Tasks
  celery_beat:
    build: .
    container_name: jobmate_celery_beat
    command: celery -A app.tasks.celery beat --loglevel=info
    environment:
      - FLASK_ENV=docker
      - DATABASE_URL=postgresql+psycopg://jobmate_user:jobmate_password@postgres:5432/jobmate_db
      - MONGODB_URI=mongodb://mongodb:27017/
      - MONGODB_DB=jobmate_mongo
      - REDIS_URL=redis://redis:6379/0
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ELASTICSEARCH_INDEX_PREFIX=jobmate
      - SECRET_KEY=your-super-secret-key-change-in-production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      - postgres
      - mongodb
      - redis
      - elasticsearch
    networks:
      - jobmate_network
    restart: unless-stopped

  # Nginx Reverse Proxy (Optional for production)
  nginx:
    image: nginx:alpine
    container_name: jobmate_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
    networks:
      - jobmate_network
    restart: unless-stopped
    profiles:
      - production

  # Monitoring with Prometheus (Optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: jobmate_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    networks:
      - jobmate_network
    restart: unless-stopped
    profiles:
      - monitoring

  # Grafana for Monitoring Dashboard (Optional)
  grafana:
    image: grafana/grafana:latest
    container_name: jobmate_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - jobmate_network
    restart: unless-stopped
    profiles:
      - monitoring

# Named Volumes
volumes:
  postgres_data:
    driver: local
  mongodb_data:
    driver: local
  redis_data:
    driver: local
  elasticsearch_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# Networks
networks:
  jobmate_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16 