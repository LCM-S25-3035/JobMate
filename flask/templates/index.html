<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Question Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f0f0; /* A slightly lighter gray for the body background */
            margin: 0; /* Remove default body margin */
        }
        .header-bar {
            background-color: #4CAF50; /* Vibrant green from the image */
            color: white;
            padding: 1.5rem 0;
            text-align: center;
            font-size: 2.5rem; /* Larger font for the title */
            font-weight: 700;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem; /* Space below the header */
        }
        .header-bar p {
            font-size: 1.2rem;
            font-weight: 400;
            margin-top: 0.5rem;
            color: #e0e0e0; /* Slightly off-white for subtitle */
        }
        .container {
            max-width: 800px;
            margin: 2rem auto; /* Adjusted margin after adding header */
            padding: 2.5rem;
            background-color: #ffffff; /* White background for the main content area */
            border-radius: 16px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
            text-align: center;
        }
        .btn-link {
            display: inline-block;
            background-color: #4CAF50; /* Green for buttons, matching header */
            color: white;
            padding: 0.9rem 2rem;
            border-radius: 10px;
            font-weight: 600;
            text-decoration: none;
            transition: background-color 0.2s ease-in-out, transform 0.1s ease-in-out;
            margin: 0.75rem;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .btn-link:hover {
            background-color: #43A047; /* Slightly darker green on hover */
            transform: translateY(-2px);
        }
        h1 {
            color: #1f2937; /* Darker gray for heading */
        }
        p {
            color: #4b5563; /* Slightly darker gray for paragraph */
        }
    </style>
</head>
<body class="bg-gray-100">
    <div class="header-bar">
         Job Interview Question Generator 📊
        <p>Explore AI-powered functionalities in one place!</p>
    </div>
    <div class="container">
        <h1 class="text-4xl font-bold text-gray-800 mb-8">Welcome to the Interview Question Generator</h1>

        <p class="text-lg text-gray-600 mb-10">Select an option to start generating questions:</p>

        <div class="flex flex-col md:flex-row justify-center items-center space-y-4 md:space-y-0 md:space-x-4">
            <a href="/questions/skills" class="btn-link">Generate by Skills</a>
            <a href="/questions/job_description" class="btn-link">Generate by Job Description</a>
            <a href="/questions/from_db" class="btn-link">Generate from Database</a>
        </div>
    </div>
</body>
</html>
