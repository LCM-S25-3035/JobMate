{% extends "base.html" %}

{% block title %}Page Not Found - JobMate{% endblock %}

{% block content %}
<div class="container-fluid vh-100 d-flex align-items-center justify-content-center" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
            <div class="card shadow-lg" style="background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: none;">
                <div class="card-body p-5 text-center">
                    <!-- Error Icon -->
                    <div class="mb-4">
                        <i class="bi bi-exclamation-triangle-fill text-warning" style="font-size: 4rem;"></i>
                    </div>
                    
                    <!-- Error Title -->
                    <h1 class="display-1 fw-bold text-primary mb-3">404</h1>
                    <h3 class="fw-bold text-dark mb-3">Page Not Found</h3>
                    
                    <!-- Error Message -->
                    <p class="text-muted mb-4">
                        The page you're looking for doesn't exist. It might have been moved, deleted, or you entered the wrong URL.
                    </p>
                    
                    <!-- Action Buttons -->
                    <div class="d-grid gap-2 d-md-block">
                        <a href="{{ url_for('main.index') }}" class="btn btn-primary btn-lg me-md-2">
                            <i class="bi bi-house-fill me-2"></i>
                            Go Home
                        </a>
                        <button onclick="history.back()" class="btn btn-outline-secondary btn-lg">
                            <i class="bi bi-arrow-left me-2"></i>
                            Go Back
                        </button>
                    </div>
                    
                    <!-- Help Links -->
                    <div class="mt-4">
                        <p class="text-muted small mb-2">Need help?</p>
                        <a href="mailto:support@jobmate.ca" class="text-decoration-none me-3">
                            <i class="bi bi-envelope me-1"></i>
                            Contact Support
                        </a>
                        <a href="{{ url_for('main.index') }}" class="text-decoration-none">
                            <i class="bi bi-question-circle me-1"></i>
                            FAQ
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
