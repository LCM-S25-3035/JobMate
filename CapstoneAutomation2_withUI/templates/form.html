<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>LinkedIn Easy Apply</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f4f8fb;
        }
        .navbar {
            background: linear-gradient(90deg, #2563eb 70%, #facc15 100%);
        }
        .navbar-brand {
            color: #fff !important;
            font-weight: bold;
            font-size: 1.5rem;
        }
        .form-container {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(37,99,235,0.08);
            padding: 2rem 2.5rem;
            margin-top: 3rem;
        }
        .btn-primary {
            background-color: #2563eb;
            border: none;
        }
        .btn-primary:hover {
            background-color: #1d4ed8;
        }
        label {
            color: #2563eb;
            font-weight: 500;
        }
        .form-title {
            color: #2563eb;
            font-weight: bold;
            margin-bottom: 1.5rem;
        }
        .alert-success {
            background-color: #dbeafe;
            color: #2563eb;
            border: none;
        }
        .alert-danger {
            background-color: #fef9c3;
            color: #b45309;
            border: none;
        }
    </style>
</head>

<body>
    <nav class="navbar px-4">
        <span class="navbar-brand">JobMate <span class="badge bg-warning text-dark ms-2">Applicant</span></span>
        <span class="ms-auto text-white">Auto-Apply</span>
    </nav>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="form-container mt-5">
                    <div class="form-title text-center">LinkedIn Easy Apply</div>
                    {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                        <div class="alert alert-{{ 'success' if category == 'success' else 'danger' }} text-center" role="alert">
                            {{ message }}
                        </div>
                        {% endfor %}
                    {% endif %}
                    {% endwith %}
                    <form method="POST">
                        <div class="mb-3">
                            <label>Email:</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Password:</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Job Title:</label>
                            <input type="text" name="keywords" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Location:</label>
                            <input type="text" name="location" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Search</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
